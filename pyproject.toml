[build-system]
requires = ["flit_core >=3.2,<4"]
build-backend = "flit_core.buildapi"

[project]
name = "StraWBerryPy"
authors = [{name = "Roberta Favata", email = "roberta.favata@phd.units.it"},
            {name = "Nicolas Baù", email = "nicolas.bau@phd.units.it"},
            {name = "Antimo Marrazzo"}]
dynamic = ["version", "description"]

keywords = ["topology", "single-point invariants", "local topological markers", "wannier90", "tight-binding"]

readme = "README.rst"
license = {file = "LICENSE.txt"}

requires-python = ">= 3.8"
dependencies = [
    'wannierberri[all]==0.15.0',
    'pythtb==1.8.0',
    'tbmodels==1.4.3',
    'opt-einsum==3.3.0'
]

[project.urls]
#Homepage = "https://example.com"
#Documentation = "https://readthedocs.org"
Repository = "https://github.com/strawberrypy-developers/strawberrypy.git"
#"Bug Tracker" = "https://github.com/me/spam/issues"
#Changelog = "https://github.com/me/spam/blob/master/CHANGELOG.md"